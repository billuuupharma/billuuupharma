<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Billuuu pharma</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div id="sidebarOverlay" class="overlay" onclick="closeSidebar()"></div>
<div id="mySidebar" class="sidebar">
    <div class="sidebar-header">
        <h3>Menu</h3>
        <button class="close-sidebar-btn" onclick="closeSidebar()">&#x2715;</button>
    </div>
    <div class="sidebar-links">
        <a href="#" onclick="adminLogin(); closeSidebar();">🔐 Admin Panel</a>
    </div>
</div>

<div id="mainView">
    <header class="header">
        <div class="menu-icon" onclick="openSidebar()">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        <div class="header-text">
            <h1 class="main-logo">Billuuu <span class="pharma-text">pharma</span></h1>
        </div>
    </header>

    <div id="adminPanel" class="admin-panel-box" style="display:none;">
        <h3>Manage Store</h3>
        <div class="admin-grid">
            <input id="brand" placeholder="Brand Name">
            <input id="salt" placeholder="Salt">
            <input id="company" placeholder="Company">
            <input id="mg" placeholder="Composition/MG">
            <input id="packing" placeholder="Packing">
            <input id="mfg" placeholder="MFG Date">
            <input id="expiry" placeholder="Expiry Date">
            <input id="mrp" placeholder="MRP (₹)">
            <select id="medCategory" class="admin-select">
                <option value="">Select Category</option>
            </select>
        </div>
        <div class="admin-checkbox-group">
            <div class="check-item"><input type="checkbox" id="isRecent"> <label>Recent</label></div>
            <div class="check-item"><input type="checkbox" id="isEthical"> <label>Ethical</label></div>
            <div class="check-item"><input type="checkbox" id="isCollection"> <label>Collection</label></div>
        </div>
        <div style="margin-top:10px;">
            <label style="font-size:12px; font-weight:700; color:#475569;">📷 Photos (select one or more)</label>
            <input type="file" id="imageFiles" accept="image/*" multiple style="display:block; margin-top:5px; width:100%;">
            <div id="imagePreviewRow" style="display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;"></div>
        </div>
        <button onclick="saveMedicine()" class="save-btn">💾 Save Medicine</button>
        <div class="admin-cat-section">
            <h4>Categories</h4>
            <div style="display: flex; gap: 8px; margin-top:5px;">
                <input id="newCatName" placeholder="New Cat Name" style="flex:1; padding:8px;">
                <button onclick="addCategory()" class="add-cat-btn">Add</button>
            </div>
            <div id="adminCatList" class="admin-cat-list"></div>
        </div>
        <button onclick="logoutAdmin()" class="logout-btn">Logout</button>
    </div>

    <div class="global-search-wrap">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Search by Brand, Salt or Company..." onkeyup="searchMedicine()">
        </div>
    </div>

    <div id="homeContent">
        <div class="container">
            <div id="recentSection" style="display:none; margin-bottom: 25px;">
                <h2 class="section-title">Recently Added</h2>
                <div id="recentMedicineContainer" class="horizontal-scroll"></div>
            </div>
            <div id="allMedsSection">
                <h2 id="collectionTitle" class="section-title">Medicine Collection</h2>
                <div id="medicineContainer" class="medicine-grid"></div>
            </div>
        </div>
    </div>

    <div id="categoryContent" style="display:none;">
        <div class="flipkart-cat-layout">
            <div id="catSidebar" class="cat-sidebar"></div>
            <div class="cat-main-content">
                <h2 id="selectedCatTitle" class="cat-page-title">Category</h2>
                <div id="catMedicineGrid" class="medicine-list-view"></div>
            </div>
        </div>
    </div>
</div>

<div class="bottom-nav-attached">
    <div id="catNavBtn" class="nav-item" onclick="switchView('categories')">📁 Categories</div>
    <div id="homeNav" class="nav-item active" onclick="switchView('home')">🏠 Home</div>
    <div id="ethicalNav" class="nav-item" onclick="switchView('ethical')">💊 Ethical</div>
</div>

<div id="detailView" class="detail-page" style="display:none;">
    <div class="top-nav">
        <button class="modern-back-btn" onclick="hideDetails()">⬅ Back</button>
    </div>
    <div id="detailContent" class="detail-fixed-body"></div>
    <div class="detail-place-order-bar" id="detailOrderBar" style="display:none;">
        <div class="detail-cart-content">
            <span>🛒 <b id="detailCartCount">0 Items Selected</b></span>
            <button class="whatsapp-btn-new" onclick="sendWhatsApp()">Order Now</button>
        </div>
    </div>
</div>

<div id="qtyPopup" class="modal" style="display:none;">
    <div class="modal-content-modern">
        <span class="close-icon-highlighted" onclick="closeQtyPopup()">&times;</span>
        <h3 id="popTitle">Quantity</h3>
        <div class="qty-control-row">
            <label>Strips</label>
            <div class="stepper">
                <button onclick="changeQty('stripQty', -1)">−</button>
                <input type="number" id="stripQty" value="0" readonly>
                <button onclick="changeQty('stripQty', 1)">+</button>
            </div>
        </div>
        <div class="qty-control-row">
            <label>Boxes</label>
            <div class="stepper">
                <button onclick="changeQty('boxQty', -1)">−</button>
                <input type="number" id="boxQty" value="0" readonly>
                <button onclick="changeQty('boxQty', 1)">+</button>
            </div>
        </div>
        <button id="confirmAddBtn" class="confirm-btn-premium">Confirm & Add</button>
    </div>
</div>

<div id="bottomCartBar" class="cart-bar-modern" style="display: none;">
    <div class="cart-content-fixed">
        <span>🛒 <b id="cartCount">0 Items Selected</b></span>
        <button class="whatsapp-btn-new" onclick="sendWhatsApp()">Order Now</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="script.js"></script>
</body>
</html>
