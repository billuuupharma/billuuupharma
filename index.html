<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wellness Medicare</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="sidebarOverlay" class="overlay" onclick="closeSidebar()"></div>
<div id="mySidebar" class="sidebar">
    <div class="sidebar-header">
        <h3>Menu</h3>
        <span class="close-sidebar" onclick="closeSidebar()">&times;</span>
    </div>
    <a href="#" onclick="adminLogin(); closeSidebar();">🔐 Admin Panel</a>
    <a href="#" onclick="showAbout(); closeSidebar();">ℹ️ About Us</a>
    <a href="#" onclick="closeSidebar()">🏠 Home</a>
</div>

<div id="mainView">
    <header class="header">
        <span class="menu-icon" onclick="openSidebar()">&#9776;</span>
        <div class="header-text">
            <h1>🏥 Wellness Medicare</h1>
            <p>Pathanpura, Deoband</p>
        </div>
    </header>

    <div id="adminPanel" class="admin-panel-box" style="display:none;">
        <h3>🛠 Cloud Management</h3>
        <div class="admin-grid">
            <input id="brand" placeholder="Brand Name">
            <input id="salt" placeholder="Salt">
            <input id="company" placeholder="Company">
            <input id="mg" placeholder="MG">
            <input id="packing" placeholder="Packing">
            <input id="mfg" placeholder="MFG">
            <input id="expiry" placeholder="Expiry">
            <input id="mrp" placeholder="MRP (₹)">
        </div>
        <input type="file" id="imageFile" accept="image/*" style="margin-top:10px;">
        <button onclick="saveMedicine()" class="save-btn">💾 Save Medicine</button>
        <button onclick="logoutAdmin()" style="width:100%; margin-top:5px; background:#666; color:white; border:none; padding:10px; border-radius:8px;">Logout</button>
    </div>

    <div class="container">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Search medicines or salt..." onkeyup="searchMedicine()">
        </div>
        <div id="medicineContainer" class="medicine-grid"></div>
    </div>
</div>

<div id="detailView" class="detail-page" style="display:none;">
    <div class="top-nav">
        <button class="modern-back-btn" onclick="hideDetails()">⬅ Back</button>
    </div>
    <div id="detailContent"></div>
</div>

<div id="qtyPopup" class="modal" style="display:none;">
    <div class="modal-content-modern">
        <span class="close-icon-highlighted" onclick="closeQtyPopup()">&times;</span>
        <h3 id="popTitle">Quantity</h3>
        <p style="font-size:12px; color:#666; margin-bottom:15px;">Adjust strips and boxes</p>
        <div class="qty-control-row">
            <label>Strips</label>
            <div class="stepper">
                <button onclick="changeQty('stripQty', -1)">−</button>
                <input type="number" id="stripQty" value="0" readonly>
                <button onclick="changeQty('stripQty', 1)">+</button>
            </div>
        </div>
        <div class="qty-control-row">
            <label>Boxes</label>
            <div class="stepper">
                <button onclick="changeQty('boxQty', -1)">−</button>
                <input type="number" id="boxQty" value="0" readonly>
                <button onclick="changeQty('boxQty', 1)">+</button>
            </div>
        </div>
        <button id="confirmAddBtn" class="confirm-btn-premium">Confirm & Add</button>
    </div>
</div>

<div id="bottomCartBar" class="cart-bar-modern" style="display: none;">
    <div class="cart-content">
        <span>🛒 <b id="cartCount">0 Items Selected</b></span>
        <button class="whatsapp-btn-new" onclick="sendWhatsApp()">Order Now</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="script.js"></script>
</body>
</html>
